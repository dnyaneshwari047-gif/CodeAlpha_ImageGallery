<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced Image Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Image Gallery</h1>

<!-- Filter Buttons -->
<div class="filter-buttons">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="nature">Nature</button>
  <button class="filter-btn" data-filter="animals">Animals</button>
  <button class="filter-btn" data-filter="cars">Cars</button>
</div>

<!-- Gallery -->
<div class="gallery">
  <img src="Image/img1.jpg" class="gallery-item" data-category="nature">
  <img src="Image/img2.jpg" class="gallery-item" data-category="animals">
  <img src="Image/img3.jpg" class="gallery-item" data-category="cars">
  <img src="Image/img4.jpg" class="gallery-item" data-category="nature">
  <img src="Image/img5.jpg" class="gallery-item" data-category="animals">
  <img src="Image/img6.jpg" class="gallery-item" data-category="cars">
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <span class="close">&times;</span>
  <img id="lightbox-img">

  <!-- Navigation -->
  <button class="prev">&#10094;</button>
  <button class="next">&#10095;</button>
</div>

<script src="script.js"></script>
</body>
</html>
